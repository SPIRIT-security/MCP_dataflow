<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Select Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    .container {
      display: flex;
      gap: 24px;
    }

    button {
      padding: 16px 32px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #007bff;
      color: white;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <button onclick="location.href='experiment/homepage.html'">
      Experiment
    </button>

    <button onclick="location.href='control/homepage.html'">
      Control
    </button>
  </div>
</body>
</html>
