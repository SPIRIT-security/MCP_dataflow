<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Detail</title>
  <link rel="stylesheet" href="css/homepage.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d97757'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='52' font-family='serif'>C</text></svg>">
</head>
<body>
  <div class="hp-page">
    <div class="mcp-detail-header">
      <a href="homepage.html" class="back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Scenarios
      </a>
      <div id="scenarioInfo"></div>
    </div>

    <div id="mcpDetailContent">
      <!-- Generated by JS -->
    </div>

    <div class="mcp-detail-footer">
      <a href="" id="goToChatBtn" class="go-chat-btn">
        Go to Chat
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
  </div>

  <div class="folder-popup-overlay" id="folderPopupOverlay" onclick="closeFolderPopup()"></div>
  <div class="folder-popup" id="folderPopup">
    <div class="folder-popup-header">
      <span>/Users/Documents/MCP/FileSystem</span>
      <button class="folder-popup-close" onclick="closeFolderPopup()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="folder-popup-body"><div class="folder-tree">
      <div class="folder-tree-item file"><span>📄</span> 1.txt</div>
      <div class="folder-tree-item folder"><span>📁</span> medical
        <div class="folder-tree-nested">
          <div class="folder-tree-item file"><span>📄</span> medical-1.docx</div>
          <div class="folder-tree-item file"><span>📄</span> medical-2.docx</div>
          <div class="folder-tree-item file"><span>📄</span> medical-3.docx</div>
        </div>
      </div>
      <div class="folder-tree-item file"><span>📄</span> 2.txt</div>
      <div class="folder-tree-item file"><span>📄</span> note_bug.txt</div>
      <div class="folder-tree-item file"><span>📄</span> 3.txt</div>
      <div class="folder-tree-item file"><span>📄</span> note_ideas.txt</div>
      <div class="folder-tree-item file"><span>📄</span> Response.txt</div>
      <div class="folder-tree-item file"><span>📄</span> note_log.txt</div>
      <div class="folder-tree-item file"><span>📄</span> extract_content.py</div>
      <div class="folder-tree-item file"><span>📄</span> note_summary.txt</div>
    </div></div>
  </div>
  <script src="js/mcp-detail.js"></script>
</body>
</html>
