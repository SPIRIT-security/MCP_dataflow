<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude · Response</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/response.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d97757'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='52' font-family='serif'>C</text></svg>">
</head>
<body>
  <div class="app" id="app">
    <!-- ===== Sidebar (same as index) ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <div class="logo">
          <svg class="logo-icon" width="28" height="28" viewBox="0 0 100 100" fill="none">
            <rect width="100" height="100" rx="20" fill="#d97757"/>
            <text x="50" y="68" text-anchor="middle" fill="white" font-size="52" font-family="serif" font-weight="600">C</text>
          </svg>
          <span class="logo-text">Claude</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>New chat</span>
        </button>
      </div>

      <div class="sidebar-search" id="sidebarSearch">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Search chats..." readonly>
      </div>

      <div class="sidebar-history" id="sidebarHistory">
        <div class="history-section">
          <div class="history-label">Today</div>
          <div id="todayHistoryItems"></div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="user-profile" id="userProfile">
          <div class="user-avatar">U</div>
          <div class="user-info">
            <span class="user-name">User</span>
            <span class="user-plan">Free plan</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ===== Main Content ===== -->
    <main class="main">
      <!-- Top bar -->
      <div class="top-bar" id="topBar">
        <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" aria-label="Open sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <div class="top-bar-model">
          <span class="model-badge" id="topBarMcpLabel">Claude Opus 4.8</span>
        </div>
        <div class="top-bar-actions">
          <button class="top-bar-btn" id="backToInputBtn" aria-label="Back to input" title="Back to prompt selection">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
          </button>
          <button class="top-bar-btn" id="shareBtn" aria-label="Share">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
              <polyline points="16 6 12 2 8 6"/>
              <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Chat messages area -->
      <div class="chat-messages" id="chatMessages">
        <div class="response-container" id="responseContainer">
          <!-- Scenario info banner -->
          <div class="scenario-banner" id="scenarioBanner" style="display:none;">
            <div class="scenario-banner-left">
              <span class="scenario-badge" id="scenarioBadge">Prompt A</span>
              <span class="scenario-separator">·</span>
              <span class="scenario-mcp-badge" id="scenarioMcpBadge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                  <line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                Anthropic owned
              </span>
            </div>
            <div class="scenario-banner-right">
              <span class="scenario-status" id="scenarioStatus">3/6 completed</span>
            </div>
          </div>

          <!-- User message bubble -->
          <div class="message-row user-row">
            <div class="message-avatar user-avatar-msg">U</div>
            <div class="message-bubble user-bubble" id="userBubble">
              <p id="userMessageText"></p>
            </div>
          </div>

          <!-- Claude response area -->
          <div class="message-row claude-row">
            <div class="message-avatar claude-avatar-msg">
              <svg width="20" height="20" viewBox="0 0 100 100" fill="none">
                <rect width="100" height="100" rx="20" fill="#d97757"/>
                <text x="50" y="68" text-anchor="middle" fill="white" font-size="50" font-family="serif">C</text>
              </svg>
            </div>
            <div class="message-content" id="claudeMessageContent">
              <!-- Thinking section -->
              <div class="thinking-section" id="thinkingSection">
                <div class="thinking-header" id="thinkingHeader">
                  <div class="thinking-header-left">
                    <svg class="thinking-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="12" cy="12" r="10"/>
                      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                      <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <span>Thinking</span>
                    <span class="thinking-duration" id="thinkingDuration"></span>
                  </div>
                  <button class="thinking-toggle" id="thinkingToggle" aria-label="Toggle thinking">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="6 9 12 15 18 9"/>
                    </svg>
                  </button>
                </div>
                <div class="thinking-body" id="thinkingBody">
                  <p class="thinking-text" id="thinkingText"></p>
                </div>
              </div>

              <!-- Tool calls container -->
              <div class="blocks-container" id="blocksContainer">
                <!-- Dynamically filled by JS -->
              </div>

              <!-- Post-tool content (hidden until user clicks Allow) -->
              <div class="post-tool-content" id="postToolContent">
                <!-- Final response -->
                <div class="final-response" id="finalResponse">
                  <div class="final-response-text" id="finalResponseText"></div>
                </div>

                <!-- Response footer -->
                <div class="response-footer">
                  <div class="response-actions">
                    <button class="response-action-btn" id="copyResponseBtn" aria-label="Copy response">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                      </svg>
                    </button>
                    <button class="response-action-btn" id="retryBtn" aria-label="Retry">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                      </svg>
                    </button>
                    <button class="response-action-btn" id="thumbsUpBtn" aria-label="Thumbs up">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                      </svg>
                    </button>
                    <button class="response-action-btn" id="thumbsDownBtn" aria-label="Thumbs down">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zM17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Continue to survey button (shown after completion or denial) -->
              <div class="survey-nav-area" id="surveyNavArea" style="display:none;">
                <a href="" class="survey-nav-btn" id="surveyNavBtn">
                  Continue to Survey
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </a>
              </div>

              <!-- Denied message (shown when user clicks Deny) -->
              <div class="denied-message" id="deniedMessage">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="15" y1="9" x2="9" y2="15"/>
                  <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                Tool access denied. The conversation cannot continue.
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area" id="inputArea">
        <div class="input-container">
          <div class="input-return-hint">
            <span class="scenario-completion-hint" id="completionHint"></span>
          </div>
        </div>
      </div>
      <!-- Overlay for mobile sidebar -->
      <div class="overlay" id="overlay"></div>
    </main>
  </div>

  <script src="js/response.js"></script>
</body>
</html>
